<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>IRONLOG — Weekly Training</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111114">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IronLog">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

  :root{
    --bg:#111114;
    --bg-raised:#1A1A20;
    --bg-raised-2:#21212A;
    --line:#2C2C36;
    --line-soft:#22222A;
    --text:#F3F2EC;
    --text-dim:#9292A0;
    --text-faint:#5C5C68;
    --accent:#D6FF3F;
    --accent-soft:rgba(214,255,63,0.14);
    --accent-text:#10130A;
    --danger:#FF4D4D;
    --danger-soft:rgba(255,77,77,0.14);
    --radius-lg:18px;
    --radius-md:13px;
    --radius-sm:9px;
    --font-display:'Bebas Neue', sans-serif;
    --font-body:'Archivo', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
    --safe-b: env(safe-area-inset-bottom, 0px);
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; background:var(--bg); color:var(--text); }
  body{
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    touch-action:manipulation;
    overscroll-behavior-y:contain;
    background-image:
      repeating-linear-gradient(135deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 14px);
    min-height:100vh;
  }
  #app{ max-width:560px; margin:0 auto; min-height:100vh; position:relative; padding-bottom:calc(96px + var(--safe-b)); }
  button{ font-family:inherit; border:none; background:none; color:inherit; cursor:pointer; }
  button:focus-visible, input:focus-visible, [tabindex]:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  input{ font-family:var(--font-mono); color:var(--text); background:transparent; border:none; }
  h1,h2,h3{ margin:0; font-family:var(--font-display); letter-spacing:0.02em; }
  p{ margin:0; }
  ::selection{ background:var(--accent); color:var(--accent-text); }
  @media (prefers-reduced-motion: reduce){ *{ animation-duration:0.001ms !important; transition-duration:0.001ms !important; } }

  /* ---------- Header / Home ---------- */
  .topband{ padding:28px 20px 6px; }
  .wordmark{ font-size:34px; line-height:1; color:var(--text); display:flex; align-items:baseline; gap:8px; }
  .wordmark span{ color:var(--accent); }
  .tagline{ font-size:12px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.18em; margin-top:4px; }

  .offline-banner{ margin:14px 20px 0; padding:10px 12px; background:var(--danger-soft); border:1px solid rgba(255,77,77,0.35); border-radius:var(--radius-sm); font-size:12.5px; color:#FFB3B3; }

  .week-strip{ display:flex; gap:6px; margin:18px 20px 4px; }
  .week-pip{ flex:1; height:5px; border-radius:4px; background:var(--line); }
  .week-pip.done{ background:var(--accent); }
  .week-label{ margin:8px 20px 0; font-size:11px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.16em; }

  .day-list{ padding:18px 14px 10px; display:flex; flex-direction:column; gap:10px; }
  .day-card{ width:100%; text-align:left; background:var(--bg-raised); border:1px solid var(--line-soft); border-radius:var(--radius-lg); padding:16px 16px; display:flex; align-items:center; gap:14px; transition:transform .12s ease, border-color .12s ease; }
  .day-card:active{ transform:scale(0.985); border-color:var(--accent); }
  .day-card__idx{ font-family:var(--font-mono); font-size:13px; color:var(--text-faint); width:22px; flex-shrink:0; }
  .day-card__main{ flex:1; min-width:0; }
  .day-card__top{ display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; }
  .day-card__title{ font-size:26px; line-height:1; }
  .day-card__group{ font-size:12.5px; color:var(--accent); text-transform:uppercase; letter-spacing:0.1em; font-weight:600; }
  .day-card__meta{ margin-top:5px; font-size:12px; color:var(--text-dim); display:flex; gap:10px; flex-wrap:wrap; }
  .day-card__chev{ color:var(--text-faint); font-size:20px; }

  .footer-link-row{ display:flex; justify-content:center; align-items:center; flex-wrap:wrap; gap:2px; padding:18px 20px 10px; }
  .footer-link{ font-size:11.5px; color:var(--text-faint); text-decoration:underline; text-underline-offset:2px; }

  /* ---------- Topbar (day view) ---------- */
  .topbar{ display:flex; align-items:center; gap:12px; padding:18px 16px 12px; }
  .back-btn{ width:38px; height:38px; border-radius:10px; background:var(--bg-raised); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .topbar__main{ flex:1; min-width:0; }
  .topbar__title{ font-size:24px; line-height:1; }
  .topbar__sub{ font-size:12px; color:var(--text-dim); margin-top:2px; }
  .edit-plan-btn{ flex-shrink:0; padding:9px 14px; border-radius:10px; background:var(--bg-raised); color:var(--text-dim); font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; border:1px solid var(--line); }
  .edit-plan-btn.active{ background:var(--accent); color:var(--accent-text); border-color:var(--accent); }

  /* ---------- Stopwatch ---------- */
  .stopwatch{ margin:0 16px 14px; background:var(--bg-raised); border:1px solid var(--line-soft); border-radius:var(--radius-lg); padding:18px; display:flex; align-items:center; justify-content:space-between; gap:14px; }
  .stopwatch__time{ font-family:var(--font-mono); font-size:34px; font-weight:600; letter-spacing:0.02em; }
  .stopwatch__pace{ font-size:11px; color:var(--text-faint); margin-top:2px; text-transform:uppercase; letter-spacing:0.1em; }
  .stopwatch__pace.over{ color:var(--danger); }
  .btn{ font-weight:700; border-radius:11px; padding:13px 18px; font-size:13.5px; letter-spacing:0.04em; text-transform:uppercase; min-height:46px; display:inline-flex; align-items:center; justify-content:center; gap:6px; }
  .btn--primary{ background:var(--accent); color:var(--accent-text); }
  .btn--primary:active{ filter:brightness(0.92); }
  .btn--ghost{ background:var(--bg-raised-2); color:var(--text); border:1px solid var(--line); }
  .btn--danger{ background:var(--danger); color:#1A0505; }
  .btn--full{ width:100%; }
  .btn--sm{ padding:9px 12px; font-size:11.5px; min-height:36px; }

  /* ---------- Exercise card ---------- */
  .ex-list{ padding:0 16px; display:flex; flex-direction:column; gap:10px; }
  .ex-card{ background:var(--bg-raised); border:1px solid var(--line-soft); border-radius:var(--radius-lg); overflow:hidden; }
  .ex-head{ width:100%; display:flex; align-items:center; gap:12px; padding:15px 16px; text-align:left; }
  .ex-head__num{ font-family:var(--font-mono); font-size:11.5px; color:var(--text-faint); }
  .ex-head__main{ flex:1; min-width:0; }
  .ex-head__name{ font-size:16px; font-weight:700; }
  .ex-head__sub{ display:flex; align-items:center; gap:8px; margin-top:4px; flex-wrap:wrap; }
  .pill{ font-size:11px; color:var(--text-dim); background:var(--bg-raised-2); border:1px solid var(--line); border-radius:99px; padding:3px 9px; font-family:var(--font-mono); }
  .badge-fail{ font-size:10px; color:var(--danger); background:var(--danger-soft); border:1px solid rgba(255,77,77,0.35); border-radius:99px; padding:3px 8px; text-transform:uppercase; letter-spacing:0.06em; font-weight:700; }
  .ex-head__chev{ color:var(--text-faint); font-size:18px; flex-shrink:0; transition:transform .15s ease; }
  .ex-head__chev.open{ transform:rotate(180deg); }
  .ex-head__check{ width:24px; height:24px; border-radius:50%; border:2px solid var(--line); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:13px; }
  .ex-head__check.complete{ background:var(--accent); border-color:var(--accent); color:var(--accent-text); }

  .ex-last{ padding:0 16px 12px; font-size:11.5px; color:var(--text-faint); font-family:var(--font-mono); }
  .ex-last b{ color:var(--text-dim); font-family:var(--font-body); font-weight:600; }

  .ex-body{ padding:2px 12px 14px; }
  .set-row{ display:flex; align-items:center; gap:8px; padding:8px 4px; border-top:1px solid var(--line-soft); touch-action:pan-y; position:relative; }
  .set-row:first-child{ border-top:none; }
  .set-row.is-fail{ background:linear-gradient(90deg, rgba(255,77,77,0.07), transparent 70%); border-radius:8px; }
  .set-label{ width:38px; flex-shrink:0; font-family:var(--font-mono); font-size:12px; color:var(--text-dim); }
  .field{ display:flex; align-items:center; background:var(--bg-raised-2); border:1px solid var(--line); border-radius:9px; flex:1; min-width:0; }
  .field button{ width:30px; height:34px; font-size:15px; color:var(--text-dim); flex-shrink:0; }
  .field input{ width:100%; text-align:center; font-size:15px; font-weight:600; padding:6px 0; min-width:0; }
  .field-unit{ font-size:9.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.08em; text-align:center; margin-top:3px; }
  .field-wrap{ flex:1; min-width:0; }
  .pr-tag{ font-size:9px; font-weight:800; color:var(--accent-text); background:var(--accent); border-radius:5px; padding:2px 5px; letter-spacing:0.04em; }
  .set-done-btn{ width:34px; height:34px; border-radius:50%; border:2px solid var(--line); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:15px; color:var(--text-faint); }
  .set-done-btn.done{ background:var(--accent); border-color:var(--accent); color:var(--accent-text); }

  .ex-setctrl{ display:flex; gap:8px; padding:10px 4px 2px; }
  .linklike{ font-size:11.5px; color:var(--text-faint); text-decoration:underline; text-underline-offset:2px; padding:4px 2px; }

  .ex-collapsed-row{ display:flex; align-items:center; gap:10px; padding:0 16px 14px; font-family:var(--font-mono); font-size:12px; color:var(--text-dim); }

  /* ---------- Progress chart ---------- */
  .ex-action-row{ display:flex; gap:14px; flex-wrap:wrap; padding:0 16px 8px; }
  .chart-panel{ margin:0 16px 12px; background:var(--bg-raised-2); border:1px solid var(--line); border-radius:var(--radius-md); padding:10px 10px 4px; }
  .chart-tabs{ display:flex; gap:6px; margin-bottom:2px; }
  .chart-tab{ font-size:10.5px; padding:5px 10px; border-radius:99px; background:var(--bg-raised); color:var(--text-faint); border:1px solid var(--line); text-transform:uppercase; letter-spacing:0.05em; font-weight:600; }
  .chart-tab.active{ background:var(--accent); color:var(--accent-text); border-color:var(--accent); }
  .chart-svg{ width:100%; height:auto; display:block; }
  .chart-grid{ stroke:var(--line); stroke-width:1; stroke-dasharray:2,3; }
  .chart-area{ fill:var(--accent); opacity:0.12; stroke:none; }
  .chart-line{ fill:none; stroke:var(--accent); stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .chart-dot{ fill:var(--text-dim); }
  .chart-dot.latest{ fill:var(--accent); }
  .chart-label{ font-family:var(--font-mono); font-size:8px; fill:var(--text-faint); }
  .chart-label.accent{ font-size:9.5px; font-weight:700; fill:var(--accent); }
  .chart-empty{ font-size:11.5px; color:var(--text-faint); padding:8px 2px 10px; }

  /* ---------- Rest timer drawer ---------- */
  .timer-drawer{ position:fixed; left:0; right:0; bottom:0; max-width:560px; margin:0 auto; transform:translateY(110%); transition:transform .28s cubic-bezier(.2,.8,.2,1); z-index:30; padding:14px 16px calc(14px + var(--safe-b)); background:var(--bg-raised); border-top:1px solid var(--line); border-radius:20px 20px 0 0; box-shadow:0 -10px 40px rgba(0,0,0,0.5); }
  .timer-drawer.active{ transform:translateY(0); }
  .timer-drawer__row{ display:flex; align-items:center; gap:16px; }
  .timer-ring-wrap{ position:relative; width:74px; height:74px; flex-shrink:0; }
  .timer-ring-wrap svg{ transform:rotate(-90deg); width:74px; height:74px; }
  .timer-ring-track{ fill:none; stroke:var(--line); stroke-width:7; }
  .timer-ring-fg{ fill:none; stroke:var(--accent); stroke-width:7; stroke-linecap:round; transition:stroke .2s ease; }
  .timer-ring-fg.alert{ stroke:var(--danger); }
  .timer-digits{ position:absolute; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:17px; font-weight:700; }
  .timer-info{ flex:1; min-width:0; }
  .timer-info__label{ font-size:10.5px; text-transform:uppercase; letter-spacing:0.12em; color:var(--text-faint); }
  .timer-info__name{ font-size:14px; font-weight:700; margin-top:2px; }
  .timer-actions{ display:flex; gap:6px; flex-shrink:0; }
  .timer-adj-btn{ width:34px; height:34px; border-radius:9px; background:var(--bg-raised-2); border:1px solid var(--line); font-family:var(--font-mono); font-size:12px; color:var(--text-dim); }
  .timer-skip-btn{ font-size:11px; color:var(--text-faint); text-decoration:underline; padding:6px; }

  /* ---------- Bottom action bar ---------- */
  .bottom-bar{ position:fixed; left:0; right:0; bottom:0; max-width:560px; margin:0 auto; padding:12px 16px calc(12px + var(--safe-b)); background:linear-gradient(180deg, rgba(17,17,20,0) 0%, var(--bg) 28%); z-index:20; }

  /* ---------- History ---------- */
  .hist-section{ padding:6px 16px 0; }
  .hist-toggle{ width:100%; display:flex; align-items:center; justify-content:space-between; padding:14px 4px; color:var(--text-dim); font-size:12.5px; text-transform:uppercase; letter-spacing:0.1em; border-top:1px solid var(--line-soft); }
  .hist-list{ display:flex; flex-direction:column; gap:8px; padding-bottom:6px; }
  .hist-item{ background:var(--bg-raised); border:1px solid var(--line-soft); border-radius:var(--radius-md); padding:12px 14px; }
  .hist-item__top{ display:flex; justify-content:space-between; font-size:12.5px; }
  .hist-item__date{ font-weight:700; }
  .hist-item__stats{ color:var(--text-faint); font-family:var(--font-mono); font-size:11.5px; margin-top:4px; }
  .hist-empty{ font-size:12px; color:var(--text-faint); padding:6px 4px 14px; }

  /* ---------- Summary modal ---------- */
  .overlay{ position:fixed; inset:0; background:rgba(8,8,10,0.72); z-index:50; display:flex; align-items:flex-end; justify-content:center; }
  .summary-sheet{ width:100%; max-width:560px; background:var(--bg-raised); border-radius:22px 22px 0 0; padding:24px 20px calc(22px + var(--safe-b)); animation:slideUp .25s ease; }
  @keyframes slideUp{ from{ transform:translateY(24px); opacity:0; } to{ transform:translateY(0); opacity:1; } }
  .summary-title{ font-size:28px; }
  .summary-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:18px 0; }
  .summary-stat{ background:var(--bg-raised-2); border:1px solid var(--line); border-radius:12px; padding:14px; }
  .summary-stat__val{ font-family:var(--font-mono); font-size:22px; font-weight:700; }
  .summary-stat__label{ font-size:10.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.1em; margin-top:3px; }
  .summary-pr{ background:var(--accent-soft); border:1px solid rgba(214,255,63,0.4); border-radius:12px; padding:12px 14px; font-size:13px; margin-bottom:16px; }
  .summary-actions{ display:flex; gap:10px; }

  .empty-state{ text-align:center; padding:40px 30px; color:var(--text-faint); font-size:13px; }

  /* ---------- Plan editor ---------- */
  .edit-hint{ padding:4px 16px 14px; font-size:12.5px; color:var(--text-faint); }
  .edit-list{ padding:0 14px; display:flex; flex-direction:column; gap:8px; }
  .edit-row{ display:flex; align-items:center; gap:10px; background:var(--bg-raised); border:1px solid var(--line-soft); border-radius:var(--radius-md); padding:12px 12px; }
  .edit-row__num{ font-family:var(--font-mono); font-size:11.5px; color:var(--text-faint); flex-shrink:0; }
  .edit-row__main{ flex:1; min-width:0; }
  .edit-row__name{ font-size:14.5px; font-weight:700; display:block; }
  .edit-row__sub{ display:flex; gap:6px; margin-top:4px; }
  .edit-row__controls{ display:flex; gap:6px; flex-shrink:0; }
  .edit-arrow, .edit-remove{ width:32px; height:32px; border-radius:9px; background:var(--bg-raised-2); border:1px solid var(--line); color:var(--text-dim); font-size:14px; display:flex; align-items:center; justify-content:center; }
  .edit-arrow:disabled{ opacity:0.3; }
  .edit-remove{ color:var(--danger); }
  .add-ex-trigger{ width:calc(100% - 28px); margin:12px 14px 20px; padding:13px; border-radius:var(--radius-md); background:var(--bg-raised-2); border:1px dashed var(--line); color:var(--text-dim); font-size:13px; font-weight:600; text-align:center; }
  .add-ex-form{ margin:12px 14px 20px; background:var(--bg-raised); border:1px solid var(--line); border-radius:var(--radius-md); padding:14px; display:flex; flex-direction:column; gap:10px; }
  .add-ex-input{ width:100%; background:var(--bg-raised-2); border:1px solid var(--line); border-radius:9px; padding:11px 12px; font-size:15px; font-family:var(--font-body); color:var(--text); }
  .add-ex-row2{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .add-ex-select{ background:var(--bg-raised-2); border:1px solid var(--line); border-radius:9px; padding:9px 10px; font-size:13px; color:var(--text); font-family:var(--font-mono); }
  .add-ex-check{ display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-dim); }
  .add-ex-actions{ display:flex; gap:10px; justify-content:flex-end; }
</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="importFileInput" accept="application/json" style="display:none" onchange="handleImportBackup(event)">
<noscript><div style="padding:40px;color:#fff;font-family:sans-serif">This page needs JavaScript enabled to run.</div></noscript>

<script>
/* ================= DATA ================= */
const PLAN_SEED = {
  monday:   { name:'Monday', title:'Shoulders', duration:'30–40 min', exercises:[
    { id:'ohp',       name:'Overhead Press', rest:120, sets:3, failure:false },
    { id:'lat-raise', name:'Lateral Raise',   rest:60,  sets:3, failure:true  },
    { id:'pec-deck',  name:'Pec Deck',        rest:60,  sets:3, failure:true  },
  ]},
  tuesday:  { name:'Tuesday', title:'Arms', duration:'60–70 min', exercises:[
    { id:'close-grip',   name:'Close Grip Bench Press', rest:120, sets:3, failure:false },
    { id:'oh-ext',        name:'Overhead Extension',     rest:75,  sets:3, failure:false },
    { id:'pushdown',      name:'Straight Bar Pushdown',  rest:75,  sets:3, failure:true  },
    { id:'bicep-curl',    name:'Biceps Curl',            rest:75,  sets:3, failure:false },
    { id:'incline-curl',  name:'Incline Curl',           rest:75,  sets:3, failure:true  },
    { id:'hammer-curl',   name:'Hammer Curl',            rest:60,  sets:3, failure:true  },
  ]},
  wednesday:{ name:'Wednesday', title:'Legs', duration:'50–60 min', exercises:[
    { id:'leg-ext',   name:'Leg Extension',                rest:60,  sets:3, failure:true  },
    { id:'squat-bss', name:'Squat / Bulgarian Split Squat', rest:180, sets:3, failure:false },
    { id:'rdl',       name:'Romanian Deadlift',             rest:120, sets:3, failure:false },
    { id:'calves',    name:'Calf Raise',                    rest:60,  sets:3, failure:true  },
    { id:'lying-curl',name:'Lying Leg Curl',                rest:75,  sets:3, failure:true  },
  ]},
  thursday: { name:'Thursday', title:'Back', duration:'50–60 min', exercises:[
    { id:'pullup',     name:'Pull-up / Lat Pulldown', rest:120, sets:3, failure:true  },
    { id:'bb-row',     name:'Barbell Row',            rest:120, sets:3, failure:false },
    { id:'cs-row',     name:'Chest Supported Row',    rest:90,  sets:3, failure:true  },
    { id:'face-pull',  name:'Face Pull',              rest:60,  sets:3, failure:true  },
  ]},
  friday:   { name:'Friday', title:'Chest', duration:'50–60 min', exercises:[
    { id:'incline-press', name:'Incline Press', rest:120, sets:3, failure:false },
    { id:'flat-press',    name:'Flat Press',     rest:120, sets:3, failure:false },
    { id:'cable-fly',     name:'Cable Fly',      rest:60,  sets:3, failure:true  },
    { id:'dips',          name:'Dips',           rest:120, sets:3, failure:false },
  ]},
};
const DAY_ORDER = ['monday','tuesday','wednesday','thursday','friday'];

/* ================= STORAGE ================= */
// Storage priority: Claude's window.storage (when running as a Claude artifact)
// → browser localStorage (when running standalone, e.g. opened as a saved file)
// → in-memory (last resort, only if both are blocked, e.g. private/incognito mode).
const memoryFallback = {};
const LS_PREFIX = 'ironlog:';
let usingClaudeStorage = false;
let usingLocalStorage = false;
let storageOk = true;

function hasClaudeStorage(){ return typeof window.storage !== 'undefined'; }
function testLocalStorage(){
  try{
    const k = '__ironlog_probe__';
    window.localStorage.setItem(k, '1');
    window.localStorage.removeItem(k);
    return true;
  }catch(e){ return false; }
}
async function storeGet(key){
  if(usingClaudeStorage){
    try{
      const r = await window.storage.get(key, false);
      if(r && r.value !== undefined) return r.value;
    }catch(e){ /* fall through */ }
  }
  if(usingLocalStorage){
    try{
      const v = window.localStorage.getItem(LS_PREFIX+key);
      if(v !== null) return v;
    }catch(e){ /* fall through */ }
  }
  return memoryFallback[key] !== undefined ? memoryFallback[key] : null;
}
async function storeSet(key, value){
  let ok = false;
  if(usingClaudeStorage){
    try{ await window.storage.set(key, value, false); ok = true; }catch(e){}
  }
  if(usingLocalStorage){
    try{ window.localStorage.setItem(LS_PREFIX+key, value); ok = true; }catch(e){}
  }
  if(!ok){ memoryFallback[key] = value; }
}
async function storeDel(key){
  if(usingClaudeStorage){ try{ await window.storage.delete(key, false); }catch(e){} }
  if(usingLocalStorage){ try{ window.localStorage.removeItem(LS_PREFIX+key); }catch(e){} }
  delete memoryFallback[key];
}
async function getJSON(key, fallback){
  const raw = await storeGet(key);
  if(raw === null || raw === undefined) return fallback;
  try{ return JSON.parse(raw); }catch(e){ return fallback; }
}
async function setJSON(key, obj){ await storeSet(key, JSON.stringify(obj)); }

/* ================= STATE ================= */
const state = {
  view: 'home',
  day: null,
  plan: null,            // dayKey -> {name,title,duration,exercises:[...]} -- mutable, persisted (seeded from PLAN_SEED on first run)
  history: {},        // dayKey -> array of sessions
  setCounts: {},       // exerciseId -> custom set count
  session: null,       // current working session for state.day
  collapsedOverride: {}, // exerciseId -> bool (manual expand/collapse)
  chartOpen: {},         // exerciseId -> bool (progress chart panel visible)
  chartMetric: {},       // exerciseId -> 'weight' | 'volume'
  editingPlan: false,    // currently editing this day's exercise list
  addingExercise: false, // add-exercise form open within edit mode
  showHistory: false,
  timer: { active:false },
  stopwatchInterval: null,
  restInterval: null,
};
let audioCtx = null;

/* ================= HELPERS ================= */
function pad2(n){ return String(n).padStart(2,'0'); }
function fmtClock(totalSeconds){
  const s = Math.max(0, Math.round(totalSeconds));
  const m = Math.floor(s/60);
  return m + ':' + pad2(s % 60);
}
function todayStr(){
  const d = new Date();
  const tz = d.getTimezoneOffset()*60000;
  return new Date(d - tz).toISOString().slice(0,10);
}
function dateStrOf(d){
  const tz = d.getTimezoneOffset()*60000;
  return new Date(d - tz).toISOString().slice(0,10);
}
function currentWeekRange(){
  const now = new Date();
  const dow = now.getDay();
  const diffToMonday = (dow === 0 ? -6 : 1 - dow);
  const monday = new Date(now); monday.setDate(now.getDate() + diffToMonday);
  const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
  return { start: dateStrOf(monday), end: dateStrOf(sunday) };
}
function prettyDate(str){
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString(undefined, { month:'short', day:'numeric' });
}
function getSetCount(ex){ return state.setCounts[ex.id] || ex.sets; }
function historicalMax(dayKey, exId){
  const hist = state.history[dayKey] || [];
  let max = 0;
  hist.forEach(sess=>{
    const ex = sess.exercises.find(e=>e.id===exId);
    if(ex) ex.sets.forEach(s=>{
      const w = parseFloat(s.weight);
      if(!isNaN(w) && w > max) max = w;
    });
  });
  return max;
}
function lastSessionFor(dayKey, exId){
  const hist = state.history[dayKey] || [];
  if(!hist.length) return null;
  const last = hist[hist.length-1];
  const ex = last.exercises.find(e=>e.id===exId);
  return ex || null;
}
function exerciseAllDone(sess, exId){
  const ex = sess.exercises.find(e=>e.id===exId);
  if(!ex || !ex.sets.length) return false;
  return ex.sets.every(s=>s.done);
}

/* ---- progress chart ---- */
function exerciseSeries(dayKey, exId){
  const hist = state.history[dayKey] || [];
  return hist.map(sess=>{
    const ex = sess.exercises.find(e=>e.id===exId);
    if(!ex || !ex.sets.length) return null;
    let maxW = 0, vol = 0;
    ex.sets.forEach(s=>{
      const w = parseFloat(s.weight)||0, r = parseFloat(s.reps)||0;
      if(w > maxW) maxW = w;
      vol += w*r;
    });
    return { date: sess.date, weight: maxW, volume: Math.round(vol) };
  }).filter(Boolean);
}
function buildChartSvg(points, metric){
  const W = 280, H = 116, padL = 30, padR = 8, padT = 16, padB = 16;
  const innerW = W-padL-padR, innerH = H-padT-padB;
  const n = points.length;
  const vals = points.map(p=>p[metric]);
  let min = Math.min(...vals), max = Math.max(...vals);
  if(min === max){ const d = min===0 ? 1 : min*0.15; min -= d; max += d; }
  else { const pad = (max-min)*0.18; min -= pad; max += pad; }
  if(min < 0) min = 0;

  const X = i => padL + (n===1 ? innerW/2 : (i/(n-1))*innerW);
  const Y = v => padT + innerH - ((v-min)/(max-min))*innerH;

  const line = points.map((p,i)=> (i===0?'M':'L') + X(i).toFixed(1) + ',' + Y(p[metric]).toFixed(1)).join(' ');
  const area = line + ` L ${X(n-1).toFixed(1)},${(padT+innerH).toFixed(1)} L ${X(0).toFixed(1)},${(padT+innerH).toFixed(1)} Z`;

  const dots = points.map((p,i)=>{
    const last = i === n-1;
    return `<circle class="chart-dot${last?' latest':''}" cx="${X(i).toFixed(1)}" cy="${Y(p[metric]).toFixed(1)}" r="${last?4:2.5}"></circle>`;
  }).join('');

  const grid = [0,0.5,1].map(f=>{
    const gy = (padT+innerH*f).toFixed(1);
    return `<line class="chart-grid" x1="${padL}" y1="${gy}" x2="${W-padR}" y2="${gy}"></line>`;
  }).join('');

  const lastLabel = `<text class="chart-label accent" x="${X(n-1).toFixed(1)}" y="${(Y(points[n-1][metric])-8).toFixed(1)}" text-anchor="end">${Math.round(points[n-1][metric]).toLocaleString()}</text>`;
  const dateStart = `<text class="chart-label" x="${padL}" y="${H-3}">${prettyDate(points[0].date)}</text>`;
  const dateEnd = `<text class="chart-label" x="${W-padR}" y="${H-3}" text-anchor="end">${prettyDate(points[n-1].date)}</text>`;

  return `<svg viewBox="0 0 ${W} ${H}" class="chart-svg" preserveAspectRatio="none">
    ${grid}
    <path class="chart-area" d="${area}"></path>
    <path class="chart-line" d="${line}"></path>
    ${dots}
    ${lastLabel}${dateStart}${dateEnd}
  </svg>`;
}
function toggleChart(exId){
  state.chartOpen[exId] = !state.chartOpen[exId];
  render();
}
function setChartMetric(exId, metric){
  state.chartMetric[exId] = metric;
  render();
}
function renderChartPanel(dayKey, exId){
  const metric = state.chartMetric[exId] || 'weight';
  const series = exerciseSeries(dayKey, exId).slice(-12);
  if(series.length < 2){
    const msg = series.length === 0
      ? 'No sessions logged yet — your trend will show up here once you finish this workout a couple of times.'
      : 'Log one more session to see a trend.';
    return `<div class="chart-panel"><div class="chart-empty">${msg}</div></div>`;
  }
  return `<div class="chart-panel">
    <div class="chart-tabs">
      <button class="chart-tab ${metric==='weight'?'active':''}" onclick="setChartMetric('${exId}','weight')">Best weight</button>
      <button class="chart-tab ${metric==='volume'?'active':''}" onclick="setChartMetric('${exId}','volume')">Volume</button>
    </div>
    ${buildChartSvg(series, metric)}
  </div>`;
}

/* ================= INIT ================= */
async function init(){
  usingClaudeStorage = hasClaudeStorage();
  usingLocalStorage = !usingClaudeStorage && testLocalStorage();
  storageOk = usingClaudeStorage || usingLocalStorage;
  state.setCounts = await getJSON('setcounts', {});
  state.plan = await getJSON('workout-plan', null);
  if(!state.plan){
    state.plan = JSON.parse(JSON.stringify(PLAN_SEED));
    await setJSON('workout-plan', state.plan);
  }
  for(const dk of DAY_ORDER){
    state.history[dk] = await getJSON('history-'+dk, []);
  }
  render();
  document.addEventListener('pointerdown', ensureAudio, { once:true });
  initSwipeHandling();
}
function persistPlan(){ return setJSON('workout-plan', state.plan); }
function ensureAudio(){
  try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
}

/* ================= SWIPE-TO-COMPLETE ================= */
// Swipe a set row right to mark it done, left to undo. Delegated on #app
// (registered once) since the row nodes themselves get replaced on every render.
let swipeState = null;
function initSwipeHandling(){
  const app = document.getElementById('app');
  app.addEventListener('touchstart', onSwipeStart, { passive:true });
  app.addEventListener('touchmove', onSwipeMove, { passive:false });
  app.addEventListener('touchend', onSwipeEnd, { passive:true });
  app.addEventListener('touchcancel', onSwipeCancel, { passive:true });
}
function onSwipeStart(e){
  const row = e.target.closest('.set-row');
  if(!row){ swipeState = null; return; }
  const doneBtn = row.querySelector('.set-done-btn');
  if(!doneBtn || doneBtn.disabled){ swipeState = null; return; } // locked until session started
  const t = e.touches[0];
  swipeState = {
    row, startX:t.clientX, startY:t.clientY, dx:0, decided:false, horizontal:false,
    exId: row.dataset.ex, idx: parseInt(row.dataset.idx, 10),
  };
  row.style.transition = 'none';
}
function onSwipeMove(e){
  if(!swipeState) return;
  const t = e.touches[0];
  const dx = t.clientX - swipeState.startX;
  const dy = t.clientY - swipeState.startY;
  if(!swipeState.decided){
    if(Math.abs(dx) < 8 && Math.abs(dy) < 8) return;
    swipeState.decided = true;
    swipeState.horizontal = Math.abs(dx) > Math.abs(dy) * 1.3;
    if(!swipeState.horizontal){ swipeState = null; return; } // vertical scroll — let the browser handle it
  }
  if(!swipeState.horizontal) return;
  e.preventDefault();
  swipeState.dx = dx;
  const clamped = Math.max(-110, Math.min(110, dx));
  swipeState.row.style.transform = `translateX(${clamped}px)`;
  const frac = Math.min(1, Math.abs(clamped) / 90);
  swipeState.row.style.background = clamped > 0
    ? `rgba(214,255,63,${(0.22*frac).toFixed(3)})`
    : clamped < 0 ? `rgba(255,77,77,${(0.18*frac).toFixed(3)})` : '';
}
function resetSwipeVisual(row){
  row.style.transition = 'transform .18s ease, background-color .18s ease';
  row.style.transform = '';
  row.style.background = '';
}
function onSwipeEnd(){
  if(!swipeState) return;
  const { row, dx, exId, idx, horizontal } = swipeState;
  resetSwipeVisual(row);
  const THRESHOLD = 64;
  if(horizontal && Math.abs(dx) >= THRESHOLD){
    const ex = state.session && state.session.exercises.find(x=>x.id===exId);
    const set = ex && ex.sets[idx];
    if(set){
      const isDone = set.done;
      if(dx > 0 && !isDone) toggleSetDone(exId, idx);
      else if(dx < 0 && isDone) toggleSetDone(exId, idx);
    }
  }
  swipeState = null;
}
function onSwipeCancel(){
  if(!swipeState) return;
  resetSwipeVisual(swipeState.row);
  swipeState = null;
}
function beep(){
  if(!audioCtx) return;
  try{
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sine'; o.frequency.value = 880;
    g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.32, audioCtx.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+0.45);
    o.start(); o.stop(audioCtx.currentTime+0.45);
  }catch(e){}
}
function buzz(){ try{ if(navigator.vibrate) navigator.vibrate([300,100,300]); }catch(e){} }

/* ================= SESSION MGMT ================= */
function emptySession(dayKey){
  const day = state.plan[dayKey];
  return {
    day: dayKey,
    startedAt: null,
    exercises: day.exercises.map(ex => ({
      id: ex.id,
      sets: Array.from({length:getSetCount(ex)}, () => ({ weight:'', reps:'', done:false }))
    }))
  };
}
async function persistSession(){
  if(!state.session || !state.session.startedAt) return;
  await setJSON('inprogress-'+state.day, state.session);
}
async function openDay(dayKey){
  stopStopwatch(); stopRestTimer(true);
  state.day = dayKey;
  state.view = 'day';
  state.showHistory = false;
  state.collapsedOverride = {};
  state.chartOpen = {};
  state.chartMetric = {};
  state.editingPlan = false;
  state.addingExercise = false;
  const draft = await getJSON('inprogress-'+dayKey, null);
  state.session = draft || emptySession(dayKey);
  if(state.session.startedAt) startStopwatch();
  render();
}
function goHome(){
  stopStopwatch(); stopRestTimer(true);
  state.view = 'home';
  state.day = null;
  state.session = null;
  render();
}
async function startSession(){
  state.session.startedAt = Date.now();
  await persistSession();
  startStopwatch();
  render();
}
function startStopwatch(){
  if(state.stopwatchInterval) clearInterval(state.stopwatchInterval);
  tickStopwatch();
  state.stopwatchInterval = setInterval(tickStopwatch, 1000);
}
function stopStopwatch(){
  if(state.stopwatchInterval){ clearInterval(state.stopwatchInterval); state.stopwatchInterval = null; }
}
function tickStopwatch(){
  if(!state.session || !state.session.startedAt) return;
  const el = document.getElementById('stopwatchDigits');
  const paceEl = document.getElementById('stopwatchPace');
  if(!el) return;
  const elapsedSec = (Date.now() - state.session.startedAt)/1000;
  const mins = Math.floor(elapsedSec/60);
  el.textContent = fmtClock(elapsedSec);
  if(paceEl){
    const range = state.plan[state.day].duration.match(/(\d+).+?(\d+)/);
    const upper = range ? parseInt(range[2],10) : null;
    if(upper && mins > upper){ paceEl.textContent = 'over target window'; paceEl.classList.add('over'); }
    else { paceEl.textContent = 'target ' + state.plan[state.day].duration; paceEl.classList.remove('over'); }
  }
}

/* ---- set field handlers ---- */
function clampNum(v){ const n = parseFloat(v); return isNaN(n) ? '' : n; }
function setField(exId, idx, key, value){
  const ex = state.session.exercises.find(e=>e.id===exId);
  ex.sets[idx][key] = value;
  persistSession();
}
function onWeightInput(exId, idx, val){ setField(exId, idx, 'weight', val); refreshSetRow(exId, idx); }
function onRepsInput(exId, idx, val){ setField(exId, idx, 'reps', val); }
function stepWeight(exId, idx, delta){
  const ex = state.session.exercises.find(e=>e.id===exId);
  const cur = clampNum(ex.sets[idx].weight) || 0;
  const next = Math.max(0, Math.round((cur + delta)*100)/100);
  ex.sets[idx].weight = next;
  persistSession();
  const input = document.getElementById('w-'+exId+'-'+idx);
  if(input) input.value = next;
  refreshSetRow(exId, idx);
}
function stepReps(exId, idx, delta){
  const ex = state.session.exercises.find(e=>e.id===exId);
  const cur = clampNum(ex.sets[idx].reps) || 0;
  const next = Math.max(0, cur + delta);
  ex.sets[idx].reps = next;
  persistSession();
  const input = document.getElementById('r-'+exId+'-'+idx);
  if(input) input.value = next;
}
function refreshSetRow(exId, idx){
  const ex = state.session.exercises.find(e=>e.id===exId);
  const w = clampNum(ex.sets[idx].weight);
  const tag = document.getElementById('pr-'+exId+'-'+idx);
  if(tag){
    const isPr = w !== '' && w > historicalMax(state.day, exId);
    tag.style.display = isPr ? 'inline-block' : 'none';
  }
}
function toggleSetDone(exId, idx){
  const ex = state.session.exercises.find(e=>e.id===exId);
  const wasDone = ex.sets[idx].done;
  ex.sets[idx].done = !wasDone;
  persistSession();
  if(!wasDone){
    const planEx = state.plan[state.day].exercises.find(e=>e.id===exId);
    startRestTimer(planEx.rest, planEx.name); // this already renders — don't render again below
  } else {
    render();
  }
}
function changeSetCount(exId, delta){
  const planEx = state.plan[state.day].exercises.find(e=>e.id===exId);
  const ex = state.session.exercises.find(e=>e.id===exId);
  const next = Math.max(1, Math.min(8, ex.sets.length + delta));
  if(next === ex.sets.length) return;
  if(next > ex.sets.length){ ex.sets.push({ weight:'', reps:'', done:false }); }
  else { ex.sets.pop(); }
  state.setCounts[planEx.id] = next;
  setJSON('setcounts', state.setCounts);
  persistSession();
  render();
}
function copyLastSession(exId){
  if(!state.session || !state.session.startedAt) return;
  const last = lastSessionFor(state.day, exId);
  if(!last) return;
  const ex = state.session.exercises.find(e=>e.id===exId);
  last.sets.forEach((s, idx)=>{
    const target = ex.sets[idx];
    if(target && target.weight === '' && target.reps === ''){
      target.weight = s.weight;
      target.reps = s.reps;
    }
  });
  persistSession();
  render();
}

/* ---- plan editing: add / remove / reorder exercises for a day ---- */
function toggleEditPlan(){
  state.editingPlan = !state.editingPlan;
  state.addingExercise = false;
  render();
}
function moveExercise(dayKey, exId, dir){
  const list = state.plan[dayKey].exercises;
  const idx = list.findIndex(e=>e.id===exId);
  const newIdx = idx + dir;
  if(idx === -1 || newIdx < 0 || newIdx >= list.length) return;
  [list[idx], list[newIdx]] = [list[newIdx], list[idx]];
  persistPlan();
  state.session = emptySession(dayKey);
  render();
}
function removeExercise(dayKey, exId){
  const list = state.plan[dayKey].exercises;
  if(list.length <= 1){ window.alert('A day needs at least one exercise.'); return; }
  const ex = list.find(e=>e.id===exId);
  if(!ex) return;
  if(!window.confirm('Remove "' + ex.name + '" from ' + state.plan[dayKey].name + '?')) return;
  state.plan[dayKey].exercises = list.filter(e=>e.id!==exId);
  delete state.setCounts[exId];
  setJSON('setcounts', state.setCounts);
  persistPlan();
  state.session = emptySession(dayKey);
  render();
}
function addExercisePrompt(){
  state.addingExercise = true;
  render();
  setTimeout(()=>{ const el = document.getElementById('newExName'); if(el) el.focus(); }, 0);
}
function cancelAddExercise(){
  state.addingExercise = false;
  render();
}
function confirmAddExercise(){
  const nameInput = document.getElementById('newExName');
  const restInput = document.getElementById('newExRest');
  const failInput = document.getElementById('newExFailure');
  const name = (nameInput.value || '').trim();
  if(!name){ nameInput.focus(); return; }
  const rest = Math.max(10, parseInt(restInput.value, 10) || 90);
  const failure = !!failInput.checked;
  const id = 'custom-' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  state.plan[state.day].exercises.push({ id, name, rest, sets:3, failure });
  persistPlan();
  state.addingExercise = false;
  state.session = emptySession(state.day);
  render();
}
function toggleExpand(exId, currentlyCollapsed){
  state.collapsedOverride[exId] = !currentlyCollapsed;
  render();
}

/* ================= REST TIMER ================= */
function startRestTimer(seconds, label){
  stopRestTimer(true);
  state.timer = { active:true, total:seconds, endAt: Date.now() + seconds*1000, label, alarmed:false };
  render();
  tickRest();
  state.restInterval = setInterval(tickRest, 250);
}
function adjustRest(deltaSec){
  if(!state.timer.active) return;
  state.timer.endAt += deltaSec*1000;
  state.timer.total = Math.max(1, state.timer.total + deltaSec);
}
function stopRestTimer(silent){
  if(state.restInterval){ clearInterval(state.restInterval); state.restInterval = null; }
  state.timer = { active:false };
  const drawer = document.getElementById('timerDrawer');
  if(drawer) drawer.classList.remove('active');
}
function tickRest(){
  if(!state.timer.active) return;
  const remaining = Math.max(0, (state.timer.endAt - Date.now())/1000);
  const C = 2*Math.PI*33;
  const frac = remaining / state.timer.total;
  const digits = document.getElementById('timerDigits');
  const ring = document.getElementById('timerRingFg');
  const drawer = document.getElementById('timerDrawer');
  if(digits) digits.textContent = fmtClock(remaining);
  if(ring) ring.style.strokeDashoffset = String(C * (1 - frac));
  if(drawer) drawer.classList.add('active');
  if(remaining <= 0 && !state.timer.alarmed){
    state.timer.alarmed = true;
    beep(); buzz();
    if(ring) ring.classList.add('alert');
    setTimeout(()=>{ stopRestTimer(true); }, 2200);
  }
}

/* ================= FINISH / SUMMARY ================= */
function computeStats(session){
  let totalSets = 0, volume = 0;
  const prs = [];
  session.exercises.forEach(ex=>{
    const planEx = state.plan[session.day].exercises.find(e=>e.id===ex.id);
    let exMax = 0;
    ex.sets.forEach(s=>{
      if(s.done && s.weight !== '' && s.reps !== ''){
        totalSets++;
        const w = parseFloat(s.weight) || 0;
        const r = parseFloat(s.reps) || 0;
        volume += w*r;
        if(w > exMax) exMax = w;
      }
    });
    if(exMax > 0 && exMax > historicalMax(session.day, ex.id)){
      prs.push(planEx.name + ' — ' + exMax + 'kg');
    }
  });
  const durationSec = session.startedAt ? (Date.now()-session.startedAt)/1000 : 0;
  return { totalSets, volume, prs, durationSec };
}
function finishSession(){
  const stats = computeStats(state.session);
  state.pendingStats = stats;
  state.view = 'summary';
  stopStopwatch();
  stopRestTimer(true);
  render();
}
async function confirmFinish(save){
  if(save){
    const entry = {
      date: todayStr(),
      timestamp: Date.now(),
      durationSec: state.pendingStats.durationSec,
      exercises: state.session.exercises.map(ex=>({
        id: ex.id,
        sets: ex.sets.filter(s=> s.weight !== '' && s.reps !== '').map(s=>({weight:s.weight, reps:s.reps}))
      }))
    };
    const list = state.history[state.day] || [];
    list.push(entry);
    if(list.length > 30) list.shift();
    state.history[state.day] = list;
    await setJSON('history-'+state.day, list);
  }
  await storeDel('inprogress-'+state.day);
  state.session = null;
  state.pendingStats = null;
  goHome();
}

/* ================= RESET ================= */
async function resetAllData(){
  if(!window.confirm('Erase all logged history and progress? This cannot be undone.')) return;
  for(const dk of DAY_ORDER){ await storeDel('history-'+dk); await storeDel('inprogress-'+dk); state.history[dk] = []; }
  await storeDel('setcounts');
  state.setCounts = {};
  goHome();
}

/* ================= BACKUP / RESTORE ================= */
async function exportBackup(){
  const payload = {
    app: 'ironlog',
    exportedAt: new Date().toISOString(),
    setCounts: state.setCounts,
    history: state.history,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ironlog-backup-' + todayStr() + '.json';
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 4000);
}
function triggerImportBackup(){
  const input = document.getElementById('importFileInput');
  if(input) input.click();
}
async function handleImportBackup(evt){
  const file = evt.target.files && evt.target.files[0];
  evt.target.value = '';
  if(!file) return;
  try{
    const text = await file.text();
    const data = JSON.parse(text);
    if(!data || (!data.history && !data.setCounts)){
      window.alert('That file doesn\'t look like an IronLog backup.');
      return;
    }
    if(!window.confirm('Import this backup? It will overwrite your current logged history and settings on this device.')) return;
    if(data.setCounts){ state.setCounts = data.setCounts; await setJSON('setcounts', state.setCounts); }
    if(data.history){
      for(const dk of DAY_ORDER){
        state.history[dk] = data.history[dk] || [];
        await setJSON('history-'+dk, state.history[dk]);
      }
    }
    window.alert('Backup imported.');
    goHome();
  }catch(e){
    window.alert('Could not read that file — make sure it\'s an IronLog backup JSON.');
  }
}

/* ================= RENDER ================= */
function render(){
  const app = document.getElementById('app');
  if(state.view === 'home') app.innerHTML = renderHome();
  else if(state.view === 'day') app.innerHTML = renderDay();
  else if(state.view === 'summary') app.innerHTML = renderDay() + renderSummary();
}

function renderHome(){
  const { start: wkStart, end: wkEnd } = currentWeekRange();
  const pips = DAY_ORDER.map(dk=>{
    const done = (state.history[dk]||[]).some(s=> s.date >= wkStart && s.date <= wkEnd);
    return '<div class="week-pip '+(done?'done':'')+'"></div>';
  }).join('');

  const cards = DAY_ORDER.map((dk, i)=>{
    const day = state.plan[dk];
    const hist = state.history[dk] || [];
    const last = hist.length ? prettyDate(hist[hist.length-1].date) : null;
    return `
      <button class="day-card" onclick="openDay('${dk}')">
        <span class="day-card__idx">0${i+1}</span>
        <span class="day-card__main">
          <span class="day-card__top">
            <span class="day-card__title">${day.name}</span>
            <span class="day-card__group">${day.title}</span>
          </span>
          <span class="day-card__meta">
            <span>${day.exercises.length} exercises</span>
            <span>·</span>
            <span>${day.duration}</span>
            <span>·</span>
            <span>${last ? 'Last: '+last : 'Not logged yet'}</span>
          </span>
        </span>
        <span class="day-card__chev">›</span>
      </button>`;
  }).join('');

  return `
    <div class="topband">
      <div class="wordmark">IRON<span>LOG</span></div>
      <div class="tagline">Weekly training log</div>
    </div>
    ${storageOk ? '' : '<div class="offline-banner">This browser is blocking storage (e.g. private mode) — progress won\'t be saved between visits. Use Backup below to keep a copy.</div>'}
    <div class="week-strip">${pips}</div>
    <div class="week-label">This week</div>
    <div class="day-list">${cards}</div>
    <div class="footer-link-row">
      <button class="footer-link" onclick="exportBackup()">Backup data</button>
      <span style="color:var(--text-faint);font-size:11.5px;margin:0 8px;">·</span>
      <button class="footer-link" onclick="triggerImportBackup()">Restore backup</button>
      <span style="color:var(--text-faint);font-size:11.5px;margin:0 8px;">·</span>
      <button class="footer-link" onclick="resetAllData()">Reset all data</button>
    </div>
  `;
}

function renderEditList(dayKey){
  const day = state.plan[dayKey];
  const rows = day.exercises.map((ex, i) => `
    <div class="edit-row">
      <span class="edit-row__num">0${i+1}</span>
      <span class="edit-row__main">
        <span class="edit-row__name">${ex.name}</span>
        <span class="edit-row__sub">
          <span class="pill">Rest ${fmtClock(ex.rest)}</span>
          ${ex.failure?'<span class="badge-fail">Failure</span>':''}
        </span>
      </span>
      <span class="edit-row__controls">
        <button class="edit-arrow" onclick="moveExercise('${dayKey}','${ex.id}',-1)" ${i===0?'disabled':''}>↑</button>
        <button class="edit-arrow" onclick="moveExercise('${dayKey}','${ex.id}',1)" ${i===day.exercises.length-1?'disabled':''}>↓</button>
        <button class="edit-remove" onclick="removeExercise('${dayKey}','${ex.id}')">✕</button>
      </span>
    </div>`).join('');

  const addForm = state.addingExercise ? `
    <div class="add-ex-form">
      <input id="newExName" type="text" placeholder="Exercise name" class="add-ex-input" autofocus>
      <div class="add-ex-row2">
        <select id="newExRest" class="add-ex-select">
          <option value="60">Rest 1:00</option>
          <option value="75">Rest 1:15</option>
          <option value="90" selected>Rest 1:30</option>
          <option value="120">Rest 2:00</option>
          <option value="180">Rest 3:00</option>
        </select>
        <label class="add-ex-check"><input id="newExFailure" type="checkbox"> Last set to failure</label>
      </div>
      <div class="add-ex-actions">
        <button class="btn btn--ghost btn--sm" onclick="cancelAddExercise()">Cancel</button>
        <button class="btn btn--primary btn--sm" onclick="confirmAddExercise()">Add exercise</button>
      </div>
    </div>` : `<button class="add-ex-trigger" onclick="addExercisePrompt()">+ Add exercise</button>`;

  return `
    <div class="edit-hint">Reorder, remove, or add exercises for ${day.name}. Tap Done when finished.</div>
    <div class="edit-list">${rows}</div>
    ${addForm}
  `;
}

function renderDay(){
  const dk = state.day;
  const day = state.plan[dk];
  const session = state.session;
  const started = !!session.startedAt;

  if(state.editingPlan){
    return `
      <div class="topbar">
        <button class="back-btn" onclick="goHome()">←</button>
        <span class="topbar__main">
          <div class="topbar__title">${day.name} — ${day.title}</div>
          <div class="topbar__sub">Editing exercise list</div>
        </span>
        <button class="edit-plan-btn active" onclick="toggleEditPlan()">Done</button>
      </div>
      ${renderEditList(dk)}
    `;
  }

  const exCards = day.exercises.map((ex, i)=>{
    const sessEx = session.exercises.find(e=>e.id===ex.id);
    const last = lastSessionFor(dk, ex.id);
    const allDone = exerciseAllDone(session, ex.id);
    const doneCount = sessEx.sets.filter(s=>s.done).length;
    const override = state.collapsedOverride[ex.id];
    const isCollapsed = override === undefined ? allDone : override;

    const lastStr = last ? last.sets.map(s=> (s.weight||'–')+'×'+(s.reps||'–')).join(', ') : 'First time logging this';

    if(isCollapsed){
      const doneStr = allDone
        ? sessEx.sets.map(s=>(s.weight||'–')+'kg×'+(s.reps||'–')).join(', ')
        : `${doneCount} of ${sessEx.sets.length} sets logged`;
      return `
        <div class="ex-card">
          <button class="ex-head" onclick="toggleExpand('${ex.id}', true)">
            <span class="ex-head__num">EX 0${i+1}</span>
            <span class="ex-head__main">
              <span class="ex-head__name">${ex.name}</span>
            </span>
            <span class="ex-head__check ${allDone?'complete':''}">${allDone?'✓':doneCount}</span>
            <span class="ex-head__chev">⌄</span>
          </button>
          <div class="ex-collapsed-row">${doneStr}</div>
        </div>`;
    }

    const setsHtml = sessEx.sets.map((s, idx)=>{
      const isLastSet = idx === sessEx.sets.length-1;
      const isFailRow = ex.failure && isLastSet;
      const w = clampNum(s.weight);
      const isPr = w !== '' && w > historicalMax(dk, ex.id);
      return `
        <div class="set-row ${isFailRow?'is-fail':''}" data-ex="${ex.id}" data-idx="${idx}">
          <span class="set-label">SET ${idx+1}</span>
          <span class="field-wrap">
            <span class="field">
              <button onclick="stepWeight('${ex.id}',${idx},-2.5)" ${!started?'disabled':''}>–</button>
              <input id="w-${ex.id}-${idx}" type="text" inputmode="decimal" placeholder="0" value="${s.weight}" ${!started?'disabled':''}
                oninput="onWeightInput('${ex.id}',${idx},this.value)">
              <button onclick="stepWeight('${ex.id}',${idx},2.5)" ${!started?'disabled':''}>+</button>
            </span>
            <span class="field-unit">kg <span id="pr-${ex.id}-${idx}" class="pr-tag" style="display:${isPr?'inline-block':'none'}">PR</span></span>
          </span>
          <span class="field-wrap">
            <span class="field">
              <button onclick="stepReps('${ex.id}',${idx},-1)" ${!started?'disabled':''}>–</button>
              <input id="r-${ex.id}-${idx}" type="text" inputmode="numeric" placeholder="0" value="${s.reps}" ${!started?'disabled':''}
                oninput="onRepsInput('${ex.id}',${idx},this.value)">
              <button onclick="stepReps('${ex.id}',${idx},1)" ${!started?'disabled':''}>+</button>
            </span>
            <span class="field-unit">reps</span>
          </span>
          <button class="set-done-btn ${s.done?'done':''}" onclick="toggleSetDone('${ex.id}',${idx})" ${!started?'disabled':''}>${s.done?'✓':''}</button>
        </div>`;
    }).join('');

    return `
      <div class="ex-card">
        <button class="ex-head" onclick="toggleExpand('${ex.id}', false)">
          <span class="ex-head__num">EX 0${i+1}</span>
          <span class="ex-head__main">
            <span class="ex-head__name">${ex.name}</span>
            <span class="ex-head__sub">
              <span class="pill">Rest ${fmtClock(ex.rest)}</span>
              ${ex.failure?'<span class="badge-fail">Last set · failure</span>':''}
            </span>
          </span>
          <span class="ex-head__chev open">⌄</span>
        </button>
        <div class="ex-last"><b>Last:</b> ${lastStr}</div>
        <div class="ex-action-row">
          ${(started && last) ? `<button class="linklike" onclick="copyLastSession('${ex.id}')">Copy last session</button>` : ''}
          <button class="linklike" onclick="toggleChart('${ex.id}')">${state.chartOpen[ex.id]?'Hide':'View'} progress chart</button>
        </div>
        ${state.chartOpen[ex.id] ? renderChartPanel(dk, ex.id) : ''}
        <div class="ex-body">
          ${setsHtml}
          <div class="ex-setctrl">
            <button class="linklike" onclick="changeSetCount('${ex.id}',1)">+ Add set</button>
            <button class="linklike" onclick="changeSetCount('${ex.id}',-1)">Remove set</button>
          </div>
        </div>

      </div>`;
  }).join('');

  const histList = (state.history[dk]||[]).slice().reverse().slice(0,8);
  const histHtml = histList.length ? histList.map(h=>{
    let vol = 0;
    h.exercises.forEach(ex=>ex.sets.forEach(s=>{ vol += (parseFloat(s.weight)||0)*(parseFloat(s.reps)||0); }));
    return `<div class="hist-item">
      <div class="hist-item__top"><span class="hist-item__date">${prettyDate(h.date)}</span><span>${fmtClock(h.durationSec)}</span></div>
      <div class="hist-item__stats">${Math.round(vol).toLocaleString()} kg total volume</div>
    </div>`;
  }).join('') : '<div class="hist-empty">No past sessions logged yet.</div>';

  return `
    <div class="topbar">
      <button class="back-btn" onclick="goHome()">←</button>
      <span class="topbar__main">
        <div class="topbar__title">${day.name} — ${day.title}</div>
        <div class="topbar__sub">${day.exercises.length} exercises · target ${day.duration}</div>
      </span>
      ${!started ? '<button class="edit-plan-btn" onclick="toggleEditPlan()">Edit</button>' : ''}
    </div>

    <div class="stopwatch">
      <span>
        <span class="stopwatch__time" id="stopwatchDigits">${started ? fmtClock((Date.now()-session.startedAt)/1000) : '0:00'}</span>
        <div class="stopwatch__pace" id="stopwatchPace">target ${day.duration}</div>
      </span>
      ${started
        ? '<button class="btn btn--primary" onclick="finishSession()">Finish</button>'
        : '<button class="btn btn--primary" onclick="startSession()">Start session</button>'}
    </div>

    <div class="ex-list">${exCards}</div>

    <div class="hist-section">
      <button class="hist-toggle" onclick="state.showHistory=!state.showHistory; render();">
        <span>Past sessions (${(state.history[dk]||[]).length})</span><span>${state.showHistory?'▾':'▸'}</span>
      </button>
      ${state.showHistory ? '<div class="hist-list">'+histHtml+'</div>' : ''}
    </div>

    <div class="timer-drawer" id="timerDrawer">
      <div class="timer-drawer__row">
        <span class="timer-ring-wrap">
          <svg viewBox="0 0 74 74">
            <circle class="timer-ring-track" cx="37" cy="37" r="33"></circle>
            <circle class="timer-ring-fg" id="timerRingFg" cx="37" cy="37" r="33"
              stroke-dasharray="${2*Math.PI*33}" stroke-dashoffset="0"></circle>
          </svg>
          <span class="timer-digits" id="timerDigits">0:00</span>
        </span>
        <span class="timer-info">
          <div class="timer-info__label">Resting</div>
          <div class="timer-info__name">${state.timer.label||''}</div>
        </span>
        <span class="timer-actions">
          <button class="timer-adj-btn" onclick="adjustRest(-15)">-15</button>
          <button class="timer-adj-btn" onclick="adjustRest(15)">+15</button>
        </span>
      </div>
      <div style="text-align:center;margin-top:6px;"><button class="timer-skip-btn" onclick="stopRestTimer()">Skip rest</button></div>
    </div>
  `;
}

function renderSummary(){
  const s = state.pendingStats;
  return `
    <div class="overlay">
      <div class="summary-sheet">
        <div class="summary-title">Session done</div>
        <div class="summary-grid">
          <div class="summary-stat"><div class="summary-stat__val">${fmtClock(s.durationSec)}</div><div class="summary-stat__label">Duration</div></div>
          <div class="summary-stat"><div class="summary-stat__val">${s.totalSets}</div><div class="summary-stat__label">Sets logged</div></div>
          <div class="summary-stat" style="grid-column:1/-1"><div class="summary-stat__val">${Math.round(s.volume).toLocaleString()} kg</div><div class="summary-stat__label">Total volume</div></div>
        </div>
        ${s.prs.length ? '<div class="summary-pr">🏆 New PR — '+s.prs.join(' · ')+'</div>' : ''}
        <div class="summary-actions">
          <button class="btn btn--ghost" style="flex:1" onclick="confirmFinish(false)">Discard</button>
          <button class="btn btn--primary" style="flex:2" onclick="confirmFinish(true)">Save session</button>
        </div>
      </div>
    </div>
  `;
}

init();

// Service worker only matters once this is hosted at a real http(s) URL —
// inside Claude's artifact viewer or a plain file:// open this will simply
// fail to register and is caught silently, no functional impact either way.
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{ /* not hosted, ignore */ });
  });
}
</script>
</body>
</html>
